# .github/workflows/deploy.yml


name: Deploy VitePress site to Pages

on:
  # 在推送到默认分支时触发
  push:
    branches: [main] # 如果你的默认分支是 master，请改为 master

  # 允许手动从 Actions 标签页触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署，跳过正在运行的和队列中的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 构建工作
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 如果未启用 lastUpdated，则不需要此项

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm # 或者 yarn / pnpm

      - name: Install dependencies
        run: npm ci
        working-directory: ./vitepress-project

      - name: Build with VitePress
        run: npm run build
        working-directory: ./vitepress-project

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: vitepress-project/docs/.vitepress/dist

  # 部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4